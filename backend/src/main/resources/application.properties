spring.application.name=fractal-puzzle
server.port=8080

# H2 in-memory database (resets on restart; swap for Postgres in production)
spring.datasource.url=jdbc:h2:mem:fractalpuzzle;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create
spring.jpa.open-in-view=false

# Cloud-native niceties
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
server.shutdown=graceful

# Compression for SVG/JSON payloads
server.compression.enabled=true
server.compression.mime-types=application/json,image/svg+xml,text/html,text/css,application/javascript
